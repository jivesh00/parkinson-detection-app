<!DOCTYPE html>
<html>
<head>
    <title>History</title>
</head>
<body>

<h2>Patient History</h2>

<table border="1">
<tr>
    <th>Name</th>
    <th>Age</th>
    <th>Result</th>
    <th>Confidence</th>
</tr>

{% for row in data %}
<tr>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
    <td>{{ row[6] }}</td>
    <td>{{ row[7] }}</td>
</tr>
{% endfor %}
</table>

<a href="/home">Back</a>

</body>
</html>
