<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
</head>
<body>
    <h1>Welcome to Parkinson Detection</h1>

    <form action="/predict" method="post">
        <input type="text" name="name" placeholder="Name" required><br>
        <input type="text" name="age" placeholder="Age" required><br>
        <input type="text" name="sex" placeholder="Sex" required><br>
        <input type="text" name="weight" placeholder="Weight" required><br>
        <input type="text" name="address" placeholder="Address" required><br>

        <input type="text" name="bmi" placeholder="BMI" required><br>
        <input type="text" name="sleep" placeholder="Sleep" required><br>
        <input type="text" name="chol" placeholder="Cholesterol" required><br>
        <input type="text" name="dep" placeholder="Depression" required><br>
        <input type="text" name="post" placeholder="Postural" required><br>

        <button type="submit">Predict</button>
    </form>

    <a href="/logout">Logout</a>
</body>
</html>
