<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
     <title>Parkinson Detection</title>
 </head>
<body>

<h1>Parkinson Detection</h1>

<form action="/predict" method="post">
    <input name="name" placeholder="Name"><br>
    <input name="age" placeholder="Age"><br>
    <input name="sex" placeholder="Sex"><br>
    <input name="weight" placeholder="Weight"><br>
    <input name="address" placeholder="Address"><br><br>

    <input name="bmi" placeholder="BMI"><br>
    <input name="sleep" placeholder="Sleep"><br>
    <input name="chol" placeholder="Cholesterol"><br>
    <input name="dep" placeholder="Depression"><br>
    <input name="post" placeholder="Postural"><br><br>

    <button type="submit">Predict</button>
</form>

<h2>{{ prediction_text }}</h2>
<canvas id="chart" width="400" height="200"></canvas>

<canvas id="chart"></canvas>

<script>
var dataValues = {{ data | tojson if data else '{}' }};

if (Object.keys(dataValues).length > 0) {
    new Chart(document.getElementById("chart"), {
        type: 'bar',
        data: {
            labels: Object.keys(dataValues),
            datasets: [{
                label: "Health Data",
                data: Object.values(dataValues)
            }]
        }
    });
}
</script>
